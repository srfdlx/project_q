<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>Welten-Spielwiese — Design-System-Labor</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #111; color: #f0ede8; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

  /* ── Toolbar ── */
  #toolbar {
    display: flex; align-items: center; gap: 8px; padding: 8px 12px;
    background: #1a1a1a; border-bottom: 1px solid #333; flex-shrink: 0; flex-wrap: wrap;
  }
  .tb-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: .06em; margin-right: 2px; }
  .world-btn, .skin-btn {
    padding: 5px 13px; font-size: 13px; border: 1px solid #444; background: #222;
    color: #ccc; cursor: pointer; border-radius: 3px; transition: all .15s;
  }
  .world-btn:hover, .skin-btn:hover { border-color: #888; color: #fff; }
  .world-btn.active { background: #f0ede8; color: #111; border-color: #f0ede8; }
  .skin-btn.active  { background: #3a5a4a; color: #d0f0d8; border-color: #3a5a4a; }
  .sep { width: 1px; height: 24px; background: #333; margin: 0 4px; }
  #toggle-inspector {
    margin-left: auto; padding: 5px 12px; font-size: 12px; border: 1px solid #555;
    background: transparent; color: #aaa; cursor: pointer; border-radius: 3px;
  }
  #toggle-inspector.open { background: #222; color: #fff; border-color: #888; }

  /* ── Inspector ── */
  #inspector {
    background: #1a1a1a; border-bottom: 1px solid #333; flex-shrink: 0;
    overflow: hidden; max-height: 0; transition: max-height .25s ease;
  }
  #inspector.open { max-height: 400px; overflow-y: auto; }
  #inspector-inner { padding: 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 700px) { #inspector-inner { grid-template-columns: 1fr; } }
  .insp-section h4 { font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: #888; margin-bottom: 10px; }
  .token-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 12px; color: #ccc; }
  .swatch { width: 18px; height: 18px; border-radius: 3px; border: 1px solid rgba(255,255,255,.15); flex-shrink: 0; }
  .token-key { color: #888; min-width: 110px; font-family: monospace; font-size: 11px; }
  .token-val { font-family: monospace; font-size: 11px; color: #e0ddd8; }
  .font-row { margin-bottom: 6px; font-size: 12px; }
  .font-name { color: #e0ddd8; font-weight: 500; }
  .font-role { color: #666; font-size: 11px; margin-left: 6px; }
  .fr-row { margin-bottom: 5px; font-size: 11px; color: #aaa; line-height: 1.4; }
  .fr-key { color: #666; font-size: 10px; font-family: monospace; }
  .radius-badge { display: inline-block; background: #2a2a2a; border: 1px solid #444; border-radius: 2px; padding: 1px 6px; font-family: monospace; font-size: 11px; color: #ccc; margin-right: 6px; }

  /* ── Preview frame ── */
  #frame-wrap { flex: 1; overflow: hidden; }
  #frame { width: 100%; height: 100%; border: none; background: #fff; }
</style>
</head>
<body>

<div id="toolbar">
  <span class="tb-label">Welt</span>
  <button class="world-btn active" onclick="switchWorld('warm-nahbar')">Warm & nahbar</button>
  <button class="world-btn" onclick="switchWorld('modern-transparent')">Modern & transparent</button>
  <button class="world-btn" onclick="switchWorld('trendig-mutig')">Trendig & mutig</button>
  <button class="world-btn" onclick="switchWorld('gehoben-elegant')">Gehoben & elegant</button>
  <div class="sep"></div>
  <span class="tb-label">Skin</span>
  <button class="skin-btn active" onclick="switchSkin('coiffeur')">Salon Mia</button>
  <button class="skin-btn" onclick="switchSkin('physio')">Praxis Mia</button>
  <button id="toggle-inspector" onclick="toggleInspector()">Tokens &amp; Formsprache</button>
</div>

<div id="inspector"><div id="inspector-inner"></div></div>
<div id="frame-wrap"><iframe id="frame" title="Welt-Preview"></iframe></div>

/* ================================================================
   RENDER-HELFER

function fontUrl(world) {
  const f = world.design_tokens.fonts;
  const families = [f.display, f.body, f.utility_mono].filter(Boolean).map(x => 'family=' + x.google).join('&');
  return `https://fonts.googleapis.com/css2?${families}&display=swap`;
}

function tel(c) { return c.tel.replace(/\s/g,''); }

function galPlaceholders_warm() {

}
function galPlaceholders_2col() {

}

function galPlaceholders_3col() {

}

function preiseListe(c, monoFont, accentColor) {
  if (!c.preise.length) return `<p style="opacity:.7">Leistungsübersicht folgt.</p>`;
  return `<ul class="pl">${c.preise.map(([l,p])=>`<li><span>${l}</span><span>${p}</span></li>`).join('')}</ul>`;
}

/* ================================================================
   WELT-RENDERER
   ================================================================ */

/* ---- 1. WARM & NAHBAR ---- */
function renderWarmNahbar(world, c) {
  const t = world.design_tokens.colors;
  const f = world.design_tokens.fonts;
  const r = world.design_tokens.radii;
  return `<!doctype html><html lang="de-CH"><head><meta charset="utf-8">
<link href="${fontUrl(world)}" rel="stylesheet">
<style>
:root{--p:${t.primary};--pd:${t.primary_dark};--r:${t.surface_tinted};--c:${t.surface_base};--h:${t.accent}}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'${f.body.family}',sans-serif;background:var(--c);color:#33232a;line-height:1.65}
.wrap{max-width:1000px;margin:auto;padding:0 1.2rem}section{padding:4.5rem 0}
h1{font-family:'${f.display.family}',serif;font-size:clamp(2.4rem,7vw,4.5rem);line-height:1;color:var(--pd)}
h2{font-family:'${f.display.family}',serif;font-size:1.9rem;color:var(--pd);margin-bottom:1.5rem}
.cta{background:var(--h);color:var(--pd);font-weight:700;text-decoration:none;padding:.7rem 1.4rem;border-radius:${r.button};display:inline-block}
.hero{background:var(--r);padding:5rem 0;border-radius:0 0 ${r.section_cap} ${r.section_cap}}
.hero p{max-width:42ch;margin:1rem 0 1.5rem;font-size:1.1rem}
.gal{display:grid;grid-template-columns:2fr 1fr 1fr;gap:.8rem;grid-auto-rows:180px}
.ph{border-radius:8px;background:linear-gradient(150deg,#e8cfc6,#d9ab9d);position:relative;overflow:hidden}
.ph::after{content:'';position:absolute;inset:0;background:linear-gradient(160deg,rgba(92,46,62,.22),rgba(217,154,61,.1))}
.ph.t{grid-row:span 2}
.preise{background:var(--p);color:var(--r)}.preise h2{color:#fff}
.pl{font-family:'${f.utility_mono?.family||'monospace'}';line-height:2.2;max-width:520px}
.pl li{list-style:none;display:flex;justify-content:space-between;border-bottom:1px dotted rgba(243,226,220,.35)}
.stimmen{background:var(--r)}
.zit{background:#fff;border-radius:${r.card};padding:1.2rem 1.4rem;margin-bottom:1rem;max-width:560px}
.zit span{font-size:.85rem;color:var(--p)}
.kontakt{background:var(--pd);color:var(--r);border-radius:${r.section_cap} ${r.section_cap} 0 0}.kontakt h2{color:#fff}
.tel-link{font-family:'${f.display.family}',serif;font-size:1.5rem;color:var(--h);text-decoration:none}
footer{background:var(--pd);color:var(--r);font-size:.85rem;padding:1.2rem 0}
footer .wrap{display:flex;justify-content:space-between;flex-wrap:wrap;gap:1rem}footer a{color:var(--r)}
@media(max-width:700px){.gal{grid-template-columns:1fr 1fr}}
</style></head><body>
<header class="hero"><div class="wrap">
<h1>${c.headline1} ${c.headline2}</h1>
<p>${c.tagline}</p>
<a class="cta" href="#t">${c.cta}</a>
</div></header>
<section><div class="wrap"><h2>Unsere Arbeiten</h2>${galPlaceholders_warm()}</div></section>
<section class="preise"><div class="wrap"><h2>Klare Preise. Keine Überraschungen.</h2>${preiseListe(c)}</div></section>
<section class="stimmen"><div class="wrap"><h2>Das sagen Kundinnen</h2>
<div class="zit"><p>${c.zitat}</p><span>— S.</span></div>
<div class="zit"><p>«Ehrliche Beratung statt Verkaufsgespräch. Genau deshalb komme ich wieder.»</p><span>— M.</span></div>
</div></section>
<section><div class="wrap"><h2>Über uns</h2><p style="max-width:52ch">${c.over_text}</p></div></section>
<section class="kontakt" id="t"><div class="wrap"><h2>${c.cta}</h2>
<p>${c.name} · ${c.ort}</p>
<a class="tel-link" href="tel:${tel(c)}">${c.tel}</a>
</div></section>
<footer><div class="wrap"><span>© 2026 ${c.name}, ${c.ort}</span><span><a href="#">Impressum</a> · <a href="#">Datenschutz</a></span></div></footer>
</body></html>`;
}

.kontakt{background:var(--pd);color:var(--sd)}.kontakt h2{color:#fff}.kontakt .eyebrow{color:var(--sa)}

footer{background:var(--pd);color:var(--sa);font-size:.85rem;padding:1.2rem 0}
footer .wrap{display:flex;justify-content:space-between;flex-wrap:wrap;gap:1rem}footer a{color:var(--sa)}
@media(max-width:700px){.fakten-grid,.cards-2{grid-template-columns:1fr}}
</style></head><body>

/* ================================================================
   INSPEKTOR
   ================================================================ */
function renderInspector(world) {
  const t = world.design_tokens;
  const fl = world.form_language;

  const colorRows = Object.entries(t.colors).map(([k,v]) =>
    `<div class="token-row">
      <div class="swatch" style="background:${v}"></div>
      <span class="token-key">${k}</span>
      <span class="token-val">${v}</span>
    </div>`
  ).join('');

  const fontRows = Object.entries(t.fonts).map(([k,f]) =>
    `<div class="font-row">
      <span class="font-name">${f.family}</span>
      <span class="font-role">[${k}] ${f.role}</span>
    </div>`
  ).join('');

  const radiiRow = Object.entries(t.radii).map(([k,v]) =>
    `<span class="radius-badge">${k}: ${v||'0'}</span>`
  ).join('');

  const heroFields = Object.entries(fl.hero).map(([k,v]) =>
    `<div class="token-row"><span class="token-key">${k}</span><span class="token-val">${JSON.stringify(v)}</span></div>`
  ).join('');

  const secFields = Object.entries(fl.sections).map(([k,v]) =>
    `<div class="token-row"><span class="token-key">${k}</span><span class="token-val">${JSON.stringify(v)}</span></div>`
  ).join('');

  const frRows = Object.entries(fl.freiheitsgrade).map(([k,v]) =>
    `<div class="fr-row"><span class="fr-key">${k}</span><br>${v}</div>`
  ).join('');

  return `
  <div class="insp-section">
    <h4>Farb-Tokens</h4>${colorRows}
    <h4 style="margin-top:12px">Schriften</h4>${fontRows}
    <h4 style="margin-top:12px">Radien</h4><div style="margin-top:4px">${radiiRow}</div>
  </div>
  <div class="insp-section">
    <h4>Formsprache · Hero</h4>${heroFields}
    <h4 style="margin-top:12px">Formsprache · Sektionen</h4>${secFields}
    <h4 style="margin-top:12px">Freiheitsgrade (FR1–FR6)</h4>${frRows}
  </div>`;
}

/* ================================================================
   HAUPT-STEUERUNG
   ================================================================ */
function getRenderer(worldId) {
  switch(worldId) {
    case 'warm-nahbar':       return renderWarmNahbar;
    case 'modern-transparent': return renderModernTransparent;
    case 'trendig-mutig':     return renderTrendigMutig;
    case 'gehoben-elegant':   return renderGehobentElegant;
  }
}

function refresh() {
  const world   = WORLDS[activeWorld];
  const content = CONTENT[activeSkin];
  const html    = getRenderer(activeWorld)(world, content);
  document.getElementById('frame').srcdoc = html;
  document.getElementById('inspector-inner').innerHTML = renderInspector(world);
}

function switchWorld(id) {
  activeWorld = id;
  document.querySelectorAll('.world-btn').forEach(b => b.classList.toggle('active', b.textContent.trim() === WORLDS[id].label));
  refresh();
}

function switchSkin(id) {
  activeSkin = id;
  document.querySelectorAll('.skin-btn').forEach(b => {
    b.classList.toggle('active', (id === 'coiffeur' && b.textContent.includes('Salon')) || (id === 'physio' && b.textContent.includes('Praxis')));
  });
  refresh();
}

function toggleInspector() {
  inspectorOpen = !inspectorOpen;
  document.getElementById('inspector').classList.toggle('open', inspectorOpen);
  document.getElementById('toggle-inspector').classList.toggle('open', inspectorOpen);
}

/* Bootstrap */
refresh();
</script>
