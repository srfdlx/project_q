<!doctype html>

<meta charset="utf-8">
<title>Welten-Spielwiese</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #111; color: #f0ede8; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

  #toolbar {
    display: flex; align-items: center; gap: 6px; padding: 7px 12px;
    background: #1a1a1a; border-bottom: 1px solid #2a2a2a; flex-shrink: 0; flex-wrap: wrap;
  }
  .tb-label { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: .08em; margin-right: 1px; white-space: nowrap; }
  .tb-btn {
    padding: 4px 11px; font-size: 12px; border: 1px solid #383838; background: #222;
    color: #bbb; cursor: pointer; border-radius: 3px; white-space: nowrap;
  }
  .tb-btn:hover { border-color: #777; color: #fff; }
  .tb-btn.active { background: #f0ede8; color: #111; border-color: #f0ede8; }
  .tb-btn.skin-active { background: #223322; color: #8fd8a0; border-color: #3a5a3a; }
  .tb-btn.fill-active { background: #1a2a3a; color: #80b0d8; border-color: #2a4a6a; }
  .sep { width: 1px; height: 20px; background: #2a2a2a; margin: 0 3px; }
  #toggle-inspector {
    margin-left: auto; padding: 4px 11px; font-size: 11px; border: 1px solid #383838;
    background: transparent; color: #888; cursor: pointer; border-radius: 3px;
  }
  #toggle-inspector.open { background: #222; color: #ddd; border-color: #666; }

  #inspector {
    background: #161616; border-bottom: 1px solid #2a2a2a; flex-shrink: 0;
    max-height: 0; overflow: hidden; transition: max-height .22s ease;
  }
  #inspector.open { max-height: 420px; overflow-y: auto; }
  #inspector-inner { padding: 14px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px; }
  @media(max-width:800px) { #inspector-inner { grid-template-columns: 1fr 1fr; } }
  .insp-section h4 { font-size: 9px; text-transform: uppercase; letter-spacing: .1em; color: #666; margin-bottom: 8px; }
  .token-row { display: flex; align-items: flex-start; gap: 7px; margin-bottom: 5px; font-size: 11px; }
  .swatch { width: 16px; height: 16px; border-radius: 2px; border: 1px solid rgba(255,255,255,.12); flex-shrink: 0; margin-top: 1px; }
  .token-key { color: #666; min-width: 100px; font-family: monospace; font-size: 10px; }
  .token-val { font-family: monospace; font-size: 10px; color: #ccc; }
  .qr-row { margin-bottom: 4px; font-size: 10px; line-height: 1.45; }
  .qr-range { font-family: monospace; color: #888; font-size: 9px; }
  .qr-layout { color: #8bc4f0; font-family: monospace; font-size: 10px; }
  .qr-cap { color: #c8a070; font-size: 9px; margin-left: 4px; }
  .fill-indicator { display: inline-block; padding: 2px 7px; border-radius: 2px; font-size: 10px; margin-right: 4px; }
  .fill-indicator.active-fill { background: #1a2a3a; color: #80b0d8; }
  .fill-indicator.not-active { color: #555; }
  .fr-row { margin-bottom: 4px; font-size: 10px; color: #999; line-height: 1.4; }
  .fr-key { color: #555; font-size: 9px; font-family: monospace; }

  #frame-wrap { flex: 1; overflow: hidden; }
  #frame { width: 100%; height: 100%; border: none; background: #fff; }
</style>
</head>
<body>

<div id="toolbar">
  <span class="tb-label">Welt</span>

   HILFSFUNKTIONEN
   ================================================================ */
function resolveLayout(rules, count) {
  for (const r of rules) {
    if (count >= r.min && (r.max === null || count <= r.max)) {
      const eff = r.cap ? Math.min(count, r.cap) : count;
      return {layout: r.layout, effectiveCount: eff, cap: r.cap};
    }
  }
  return {layout:'hidden', effectiveCount:0, cap:null};
}

function fontUrl(world) {
  const f = world.design_tokens.fonts;
  const gs = Object.values(f).filter(Boolean).map(x => 'family=' + x.google).join('&');
  return `https://fonts.googleapis.com/css2?${gs}&display=swap`;
}

function tel(c) { return c.tel.replace(/\s/g,''); }

        </div>

    return `
      <section style="background:${t.primary};color:${t.surface_base};padding:4.5rem 0"><div class="wrap">
        <h2 style="font-family:'${f.display.family}';font-size:clamp(2rem,5vw,3rem);text-transform:uppercase;margin-bottom:1.2rem;line-height:.95">${(c.fakten_title||'').toUpperCase()}.</h2>
        <ul style="font-family:'${mono}';font-size:.9rem;line-height:2;list-style:none;border-left:4px solid ${t.accent};padding-left:1.4rem">
          ${facts.map(ft=>`<li style="border-bottom:1px solid rgba(245,243,238,.15);padding:.3rem 0">${ft}</li>`).join('')}
        </ul>
      </div></section>`;
  }

  const marquee = world.form_language.sections.marquee_text || 'Schnitt — Farbe — Balayage — Styling — ';
  const css = `
    *{margin:0;padding:0;box-sizing:border-box}body{font-family:'${f.body.family}',sans-serif;background:${t.surface_base};color:${t.text};line-height:1.55}
    .wrap{max-width:1100px;margin:auto;padding:0 1.2rem}
    .cta{background:${t.accent};color:${t.surface_base};font-weight:700;text-transform:uppercase;letter-spacing:.06em;text-decoration:none;padding:.7rem 1.4rem;display:inline-block}
    .kontakt{background:${t.accent};color:${t.primary}}
    footer{background:${t.primary};color:${t.muted||'#8a8a8a'};font-size:.85rem;padding:1.2rem 0}
    footer .wrap{display:flex;justify-content:space-between;flex-wrap:wrap;gap:1rem}footer a{color:${t.surface_base}}
    @keyframes mq{to{transform:translateX(-50%)}}
    @media(prefers-reduced-motion:reduce){.mq-inner{animation:none}}`;

  return `<!doctype html><html lang="de-CH"><head><meta charset="utf-8">
<link href="${fontUrl(world)}" rel="stylesheet">
<style>${css}</style></head><body>
<header style="background:${t.primary};color:${t.surface_base};padding:4rem 0 0">
  <div class="wrap">
    <h1 style="font-family:'${f.display.family}';font-size:clamp(3.2rem,12vw,8rem);line-height:.9;text-transform:uppercase">
      ${c.headline1.toUpperCase()}<span style="color:${t.accent};display:block;margin-left:6vw">${c.headline2.toUpperCase()}</span>
    </h1>
    <div style="display:flex;gap:1.5rem;align-items:center;margin:1.8rem 0 3rem;flex-wrap:wrap">
      <a class="cta" href="#t">${c.cta.toUpperCase()}</a>
      <p style="max-width:32ch;color:${t.muted||'#8a8a8a'}">${c.tagline}</p>
    </div>
  </div>
  <div style="height:26vh;position:relative;overflow:hidden">
    <div style="position:absolute;inset:0;background:url('${c.hero_strip_image}') center/cover"></div>
    <div style="position:absolute;inset:0;background:linear-gradient(120deg,rgba(42,42,42,.55),rgba(17,17,17,.85))"></div>
  </div>
</header>
<div style="background:${t.accent};overflow:hidden;padding:.4rem 0;font-family:'${f.display.family}';text-transform:uppercase;white-space:nowrap;font-size:.85rem;letter-spacing:.04em" aria-hidden="true">
  <span class="mq-inner" style="display:inline-block;padding-right:3rem;animation:mq 18s linear infinite">${marquee.repeat(4)}</span>
</div>
${galleryHtml()}
${servicesHtml()}
${factsHtml()}
${quotesHtml()}
<section style="padding:4rem 0"><div class="wrap">
  <p style="max-width:52ch">${c.over_text}</p>
</div></section>
<section class="kontakt" id="t"><div class="wrap" style="padding:4rem 0">
  <h2 style="font-family:'${f.display.family}';font-size:clamp(2rem,5vw,3rem);text-transform:uppercase;margin-bottom:1rem;line-height:.95">${c.cta.toUpperCase()}.</h2>
  <a style="font-family:'${f.display.family}';font-size:clamp(1.8rem,4.5vw,3rem);text-decoration:none;text-transform:uppercase;display:block;margin-bottom:.6rem" href="tel:${tel(c)}">${c.tel}</a>
  <span style="font-family:'${mono}';font-size:.9rem">${c.name} · ${c.ort}</span>
</div></section>
<footer><div class="wrap"><span>© 2026 ${c.name}</span><span><a href="#">Impressum</a> · <a href="#">Datenschutz</a></span></div></footer>
</body></html>`;
}

/* ================================================================
   WELT-RENDERER — GEHOBEN & ELEGANT
   ================================================================ */
function renderGehobentElegant(world, skin, fill) {
  const c = CONTENT_POOL[skin];
  const t = world.design_tokens.colors;
  const f = world.design_tokens.fonts;
  const qr = world.form_language.quantity_rules;
  const muted = t.text_muted || '#6b6560';

  const qL = resolveLayout(qr.quotes,        fill.quotesN);
  const gL = resolveLayout(qr.gallery_items,  fill.galleryN);
  const sL = resolveLayout(qr.services,       fill.servicesN);
  const fL = resolveLayout(qr.facts,         fill.factsN);

  const quotes   = c.quotes_all.slice(0, qL.effectiveCount);
  const services = c.services_all.slice(0, sL.effectiveCount);
  const facts    = c.facts_all.slice(0, fL.effectiveCount);

  const sep = `<div style="height:1px;background:rgba(28,36,32,.15);margin:0"></div>`;

  function quotesHtml() {
    if (qL.layout === 'hidden') return '';
    /* diese Welt zeigt Zitate immer solo, gross, zentriert — Knappheit als Inszenierung */
    return `
      ${sep}
      <section style="padding:8rem 0;text-align:center"><div class="wrap">
        <p style="font-family:'${f.display.family}',serif;font-style:italic;font-weight:300;font-size:clamp(2rem,4vw,3.2rem);line-height:1.2;max-width:26ch;margin:0 auto;color:${t.primary}">
          «${quotes[0].text}»
        </p>
        <p style="margin-top:1.5rem;font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;color:${muted}">— ${quotes[0].who}</p>
      </div></section>`;
  }

  function galleryHtml() {
    if (gL.layout === 'hidden') return '';
    const n = gL.effectiveCount;
    /* symmetrisch: 1 grosses Bild, ein ruhiges Paar oder ein gleichmässiges Trio — nie versetzt; gedämpftes Duotone statt bunter Fotos (FR5) */
    const cols = n === 1 ? '1fr' : n === 2 ? '1fr 1fr' : '1fr 1fr 1fr';
    return `${sep}<section style="padding:7rem 0;text-align:center"><div class="wrap">
      <h2 style="font-family:'${f.display.family}',serif;font-weight:300;font-size:2rem;margin-bottom:2rem;line-height:1.15">Unsere <em style="font-style:italic">Arbeiten</em></h2>
      <div style="display:grid;grid-template-columns:${cols};gap:2rem;height:${n===1?'420px':'320px'}">
        ${Array(n).fill(0).map((_,i)=>`<div style="background:url('${c.gallery_images[i%c.gallery_images.length]}') center/cover;filter:sepia(.25) saturate(.55) brightness(1.02)"></div>`).join('')}
      </div></div></section>`;
  }

  function servicesHtml() {
    if (sL.layout === 'hidden') return '';
    if (sL.layout === 'inline_list') return `
      ${sep}<section style="padding:6rem 0"><div class="wrap">
        <h2 style="font-family:'${f.display.family}',serif;font-weight:300;font-size:2rem;margin-bottom:1.8rem;line-height:1.15">Leistungen</h2>
        <ul style="list-style:none;display:flex;flex-direction:column;gap:.8rem">
          ${services.map(s=>`<li style="display:flex;align-items:center;gap:1rem;padding:.6rem 0;border-bottom:1px solid rgba(26,24,20,.1)"><span style="color:${t.accent};font-size:.9rem">—</span><span style="font-size:1rem;color:${t.primary}">${s}</span></li>`).join('')}
        </ul>
      </div></section>`;
    return `
      ${sep}<section style="padding:6rem 0"><div class="wrap">
        <h2 style="font-family:'${f.display.family}',serif;font-weight:300;font-size:2rem;margin-bottom:1.8rem;line-height:1.15">Leistungen</h2>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
          ${services.map(s=>`<div style="border:1px solid rgba(26,24,20,.18);padding:1.2rem 1.4rem;border-radius:2px"><span style="font-size:.95rem;color:${t.primary}">${s}</span></div>`).join('')}
        </div>
      </div></section>`;
  }

  function factsHtml() {
    if (fL.layout === 'hidden' || !facts.length) return '';
    if (fL.layout === 'inline_facts') return `
      ${sep}<section style="padding:6rem 0"><div class="wrap">
        <p style="font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;color:${t.accent};margin-bottom:.8rem">${c.fakten_title}</p>
        <div style="border-left:1px solid ${t.accent};padding-left:1.4rem">
          ${facts.map(ft=>`<p style="font-size:.95rem;margin-bottom:.4rem;color:${muted}">— ${ft}</p>`).join('')}
        </div>
      </div></section>`;
    return `
      ${sep}<section style="padding:6rem 0"><div class="wrap">
        <h2 style="font-family:'${f.display.family}',serif;font-weight:300;font-size:2rem;margin-bottom:1.8rem;line-height:1.15"><em style="font-style:italic">${c.fakten_title}</em></h2>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:2rem;align-items:start">
          <p style="color:${muted};font-size:.95rem;line-height:1.7">Damit Sie sich um Ihre Genesung kümmern können — nicht um Formulare.</p>
          <ul style="border:1px solid rgba(26,24,20,.2);padding:1.8rem;list-style:none;border-radius:2px">
            ${facts.map(ft=>`<li style="padding:.4rem 0;border-bottom:1px solid rgba(26,24,20,.1);font-size:.9rem;color:${t.primary};padding-left:1rem;position:relative"><span style="position:absolute;left:0;color:${t.accent}">—</span>${ft}</li>`).join('')}
          </ul>
        </div>
      </div></section>`;
  }

  const css = `
    *{margin:0;padding:0;box-sizing:border-box}body{font-family:'${f.body.family}',sans-serif;background:${t.surface_base};color:${t.primary};line-height:1.7;font-weight:300}
    .wrap{max-width:900px;margin:auto;padding:0 1.5rem}
    .cta{border:1px solid ${t.primary};color:${t.primary};font-size:.85rem;letter-spacing:.1em;text-decoration:none;padding:.65rem 1.8rem;display:inline-block}
    footer{border-top:1px solid rgba(28,36,32,.15);padding:1.2rem 0;font-size:.8rem;color:${muted}}
    footer .wrap{display:flex;justify-content:space-between;gap:1rem;max-width:1020px}footer a{color:${muted}}`;

  return `<!doctype html><html lang="de-CH"><head><meta charset="utf-8">
<link href="${fontUrl(world)}" rel="stylesheet">
<style>${css}</style></head><body>
<header style="padding:8rem 0;text-align:center"><div class="wrap">
  <div style="width:2.5rem;height:1px;background:${t.accent};margin:0 auto 2rem"></div>
  <h1 style="font-family:'${f.display.family}',serif;font-weight:300;font-size:clamp(2.2rem,3.6vw,3.6rem);line-height:1.15;max-width:22ch;margin:0 auto">
    ${c.headline1} <em style="font-style:italic">${c.headline2}</em>
  </h1>
  <p style="max-width:38ch;margin:1.6rem auto 2.2rem;color:${muted};font-size:.95rem">${c.tagline}</p>
  <a class="cta" href="#t">${c.cta}</a>
</div></header>
${sep}
${factsHtml()}
${galleryHtml()}
${sep}
<section style="padding:8rem 0;text-align:center"><div class="wrap">
  <span style="font-family:'${f.display.family}',serif;font-weight:300;font-size:clamp(5rem,14vw,10rem);line-height:1;color:${t.accent};display:block">8</span>
  <span style="font-size:.85rem;letter-spacing:.12em;text-transform:uppercase;color:${muted}">Jahre Erfahrung in ${c.ort}</span>
</div></section>
${servicesHtml()}
${quotesHtml()}
${sep}
<section style="padding:7rem 0;text-align:center"><div class="wrap"><p style="max-width:52ch;margin:0 auto;color:${muted}">${c.over_text}</p></div></section>
${sep}
<section style="background:${t.surface_tinted};padding:7rem 0;text-align:center" id="t"><div class="wrap">
  <h2 style="font-family:'${f.display.family}',serif;font-weight:300;font-size:2rem;margin-bottom:1.2rem;line-height:1.15"><em style="font-style:italic">${c.cta}</em></h2>
  <a style="font-family:'${f.display.family}',serif;font-weight:300;font-size:1.8rem;color:${t.accent};text-decoration:none" href="tel:${tel(c)}">${c.tel}</a>
  <p style="margin-top:.8rem;color:${muted}">${c.name} · ${c.ort}</p>
</div></section>
<footer><div class="wrap"><span>© 2026 ${c.name}, ${c.ort}</span><span><a href="#">Impressum</a> · <a href="#">Datenschutz</a></span></div></footer>
</body></html>`;
}

/* ================================================================
   INSPEKTOR
   ================================================================ */
function renderInspector(world, skin, fill) {
  const t = world.design_tokens;
  const fl = world.form_language;
  const f = fill;
  const qr = fl.quantity_rules;

  const colorRows = Object.entries(t.colors).map(([k,v]) =>
    `<div class="token-row"><div class="swatch" style="background:${v}"></div><span class="token-key">${k}</span><span class="token-val">${v}</span></div>`
  ).join('');

  const fontRows = Object.values(t.fonts).map(ft =>
    `<div class="token-row"><span class="token-key" style="color:#aaa">${ft.family}</span><span class="token-val" style="color:#888">${ft.role}</span></div>`
  ).join('');

  const radiiRows = Object.entries(t.radii).map(([k,v]) =>
    `<div class="token-row"><span class="token-key">${k}</span><span class="token-val">${v||'0'}</span></div>`
  ).join('');

  function fillBadges(type, n) {
    const r = resolveLayout(qr[type], n);
    return `<span style="font-family:monospace;font-size:10px;color:#8bc4f0">${r.layout}</span>${r.cap?`<span class="qr-cap">→ cap ${r.cap}</span>`:''}`;
  }

  const qrSection = (type, label) => {
    const rules = qr[type];
    return `<div style="margin-bottom:8px">
      <div style="font-size:9px;color:#666;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px">${label}</div>
      ${rules.map(r=>{
        const isActive = (type === 'quotes' && f.quotesN >= r.min && (r.max===null||f.quotesN<=r.max))
          || (type === 'gallery_items' && f.galleryN >= r.min && (r.max===null||f.galleryN<=r.max))
          || (type === 'services' && f.servicesN >= r.min && (r.max===null||f.servicesN<=r.max))
          || (type === 'facts' && f.factsN >= r.min && (r.max===null||f.factsN<=r.max));
        return `<div class="qr-row" style="${isActive?'background:#1a2a1a;border-radius:2px;padding:2px 4px':''}">
          <span class="qr-range">${r.min}${r.max===null?'+':'–'+(r.max===0?'0':r.max)} → </span>
          <span class="qr-layout">${r.layout}</span>
          ${r.cap?`<span class="qr-cap">cap:${r.cap}</span>`:''}
          ${r.overflow?`<span style="color:#c07050;font-size:9px;margin-left:3px">${r.overflow}</span>`:''}
        </div>`;
      }).join('')}
    </div>`;
  };

  const fillRow = (label, n) => `<div class="token-row"><span class="token-key">${label}</span><span class="token-val" style="color:#8bc4f0">${n}</span></div>`;

  return `
    <div class="insp-section">
      <h4>Farb-Tokens</h4>${colorRows}
      <h4 style="margin-top:10px">Schriften</h4>${fontRows}
      <h4 style="margin-top:10px">Radien</h4>${radiiRows}
    </div>
    <div class="insp-section">
      <h4>Aktive Befüllung (${Object.keys(FILLS).find(k=>FILLS[k]===f)||'?'})</h4>
      ${fillRow('quotes', f.quotesN)}
      ${fillRow('gallery_items', f.galleryN)}
      ${fillRow('services', f.servicesN)}
      ${fillRow('facts', f.factsN)}
      <h4 style="margin-top:10px">Aktives Layout pro Sektion</h4>
      ${['quotes','gallery_items','services','facts'].map(type=>{
        const count = {quotes:f.quotesN,gallery_items:f.galleryN,services:f.servicesN,facts:f.factsN}[type];
        const r = resolveLayout(qr[type], count);
        return `<div class="token-row"><span class="token-key">${type}</span><span class="qr-layout">${r.layout}</span>${r.cap?`<span class="qr-cap"> →${r.effectiveCount}</span>`:''}</div>`;
      }).join('')}
    </div>
    <div class="insp-section">
      <h4>Quantity Rules</h4>
      ${qrSection('quotes','Zitate')}
      ${qrSection('gallery_items','Galerie')}
      ${qrSection('services','Leistungen')}
      ${qrSection('facts','Fakten')}
    </div>`;
}

/* ================================================================
   ZUSTAND & STEUERUNG
   ================================================================ */
let activeWorld = 'warm-nahbar';
let activeSkin  = 'coiffeur';
let activeFill  = 'minimal';
let inspectorOpen = false;

function getRenderer(id) {
  return {
    'warm-nahbar':        renderWarmNahbar,
    'modern-transparent': renderModernTransparent,
    'trendig-mutig':      renderTrendigMutig,
    'gehoben-elegant':    renderGehobentElegant
  }[id];
}

function refresh() {
  const world = WORLDS[activeWorld];
  const fill  = FILLS[activeFill];
  document.getElementById('frame').srcdoc = getRenderer(activeWorld)(world, activeSkin, fill);
  document.getElementById('inspector-inner').innerHTML = renderInspector(world, activeSkin, fill);
}

function switchWorld(id) {
  activeWorld = id;
  document.querySelectorAll('.tb-btn').forEach(b => {
    if (['Warm & nahbar','Modern & transparent','Trendig & mutig','Gehoben & elegant'].includes(b.textContent.trim()))
      b.classList.toggle('active', WORLDS[id].label === b.textContent.trim());
  });
  refresh();
}

function switchSkin(id) {
  activeSkin = id;
  document.querySelectorAll('.tb-btn').forEach(b => {
    if (b.textContent.includes('Salon') || b.textContent.includes('Praxis'))
      b.classList.toggle('skin-active', (id==='coiffeur'&&b.textContent.includes('Salon'))||(id==='physio'&&b.textContent.includes('Praxis')));
  });
  refresh();
}

function switchFill(id) {
  activeFill = id;
  document.querySelectorAll('.tb-btn').forEach(b => {
    if (['Minimal','Typisch','Maximal'].includes(b.textContent.trim()))
      b.classList.toggle('fill-active', b.textContent.trim().toLowerCase() === id);
  });
  refresh();
}

function toggleInspector() {
  inspectorOpen = !inspectorOpen;
  document.getElementById('inspector').classList.toggle('open', inspectorOpen);
  document.getElementById('toggle-inspector').classList.toggle('open', inspectorOpen);
}

refresh();
</script>
</body>
</html>
