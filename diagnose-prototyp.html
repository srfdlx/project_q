<!doctype html>
<html lang="de-CH">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Website-Diagnose — Prototyp</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--ink:#1c2528;--bg:#f6f4ef;--acc:#0e4f5c;--soft:#dfe7e3;--warn:#b3562e;
    --fd:'Bricolage Grotesque',sans-serif;--fb:'Instrument Sans',sans-serif}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:var(--fb);background:var(--bg);color:var(--ink);font-size:17px;line-height:1.55}
  .app{max-width:640px;margin:0 auto;padding:2.5rem 1.2rem 5rem}
  h1{font-family:var(--fd);font-weight:600;font-size:1.5rem;margin-bottom:.4rem}
  .sub{color:#5a6a6e;font-size:.95rem;margin-bottom:2rem}
  .progress{height:4px;background:var(--soft);border-radius:2px;margin-bottom:2.2rem;overflow:hidden}
  .progress i{display:block;height:100%;background:var(--acc);width:0;transition:width .3s}
  .frage h2{font-family:var(--fd);font-weight:600;font-size:1.3rem;line-height:1.3;margin-bottom:.5rem}
  .frage .hint{color:#5a6a6e;font-size:.92rem;margin-bottom:1.4rem}
  .opt{display:block;width:100%;text-align:left;background:#fff;border:2px solid var(--soft);border-radius:10px;
    padding:.95rem 1.1rem;margin-bottom:.7rem;cursor:pointer;font:inherit;transition:border-color .15s}
  .opt:hover{border-color:var(--acc)}
  .opt.sel{border-color:var(--acc);background:#eef4f3}
  .opt small{display:block;color:#5a6a6e;font-size:.85rem;margin-top:.15rem}
  .opt.dis{opacity:.45;cursor:not-allowed}
  label{display:block;font-weight:600;font-size:.9rem;margin:1rem 0 .3rem}
  input[type=text]{width:100%;padding:.7rem .9rem;border:2px solid var(--soft);border-radius:8px;font:inherit;background:#fff}
  input[type=text]:focus{outline:none;border-color:var(--acc)}
  .nav{display:flex;justify-content:space-between;gap:1rem;margin-top:2rem}
  .btn{font:inherit;font-weight:600;padding:.75rem 1.5rem;border-radius:999px;border:none;cursor:pointer}
  .btn.next{background:var(--acc);color:#fff}
  .btn.next:disabled{opacity:.4;cursor:not-allowed}
  .btn.back{background:none;color:#5a6a6e}
  .btn.gen{background:var(--warn);color:#fff;font-size:1.05rem;padding:.9rem 2rem}
  .default-note{background:#eef4f3;border-left:4px solid var(--acc);padding:.8rem 1rem;font-size:.9rem;border-radius:0 8px 8px 0;margin-bottom:1.4rem}
  .gate{background:#fdf1ec;border:2px solid var(--warn);border-radius:10px;padding:1.3rem}
  .gate h3{font-family:var(--fd);margin-bottom:.5rem}
  .review-box{background:#fff;border:2px solid var(--soft);border-radius:10px;padding:1.3rem;margin-bottom:1rem}
  .review-box h3{font-family:var(--fd);font-size:1.05rem;margin-bottom:.6rem}
  .review-box ul{padding-left:1.2rem;font-size:.95rem}
  .review-box li{margin-bottom:.3rem}
  .tag{display:inline-block;background:var(--soft);border-radius:4px;padding:.1rem .5rem;font-size:.8rem;margin-left:.4rem}
  .edit{font:inherit;background:none;border:none;color:var(--acc);cursor:pointer;font-size:.95rem;margin-left:.5rem;padding:.1rem .3rem;border-radius:4px}
  .edit:hover{background:var(--soft)}
  #resultat{display:none;position:fixed;inset:0;background:#fff;z-index:100;flex-direction:column}
  #resultat.on{display:flex}
  .res-bar{background:var(--ink);color:#fff;padding:.6rem 1rem;display:flex;justify-content:space-between;align-items:center;font-size:.9rem}
  .res-bar button{font:inherit;background:#fff;color:var(--ink);border:none;border-radius:999px;padding:.4rem 1rem;cursor:pointer;font-weight:600}
  #frame{flex:1;border:none;width:100%}
</style>
</head>
<body>
<div class="app">
  <h1>Website-Diagnose</h1>
  <p class="sub">Beantworte ein paar Fragen über dein Geschäft — wir übersetzen sie in deine Website.</p>
  <div class="progress"><i id="prog"></i></div>
  <div id="stage"></div>
</div>

<div id="resultat">
  <div class="res-bar">
    <span>Dein Website-Vorschlag — aus deinen Antworten erzeugt</span>
    <button onclick="closeResult()">← Zurück zum Fragebogen</button>
  </div>
  <iframe id="frame" title="Website-Vorschlag"></iframe>
</div>

<script>
/* ================= STATE ================= */
const A = {branche:null,zweck:null,charakter:null,vertrauen:[],spez:[],reg:null,conversion:null,team:null,
           name:'',ort:'',tel:'056 200 00 00'};
let step = 0, returnToReview = false;

/* ================= BRANCHENPROFILE (Fragen als Daten — Motor/Profil-Prinzip) ================= */
const PROFILES = {
 coiffeur:{
  label:'Coiffeur', platzhalterName:'z.B. Salon Mia', defaultOrt:'Baden',
  zweckSatz:'Die meisten Coiffeure wollen vor allem eins: dass neue Kunden sie online finden und einfach einen Termin bekommen. Stimmt das für dich?',
  welten:[ ['warm','Warm & nahbar','„hier fühl ich mich willkommen"'],
           ['trendig','Trendig & mutig','„hier passiert was"'],
           ['gehoben','Gepflegt & gehoben','Welt in Arbeit',true],
           ['modern','Modern & minimal','Welt in Arbeit',true] ],
  vertrauenFrage:'Was überzeugt jemanden, dass er bei DIR richtig ist?',
  vertrauenOpts:[ ['arbeiten','Meine Arbeiten','Galerie mit deinen Frisuren'],
                  ['bewertungen','Bewertungen & Stimmen','Zitate zufriedener Kundinnen'],
                  ['erfahrung','Meine Erfahrung','Jahre, Geschichte, Persönlichkeit'] ],
  hatSpez:false, hatReg:false, convClass:'action',
  convFrage:'Wie sollen Kunden einen Termin bekommen?',
  convHint:'Wir fragen nach Verhalten — nicht nach Widgets.',
  convOpts:[ ['anruf','Anrufen oder WhatsApp genügt','Nummer prominent, ein Fingertipp'],
             ['formular','Online-Anfrage, ich melde mich','Formular mit Wunschtermin'],
             ['buchung','Echte Online-Buchung','Kalender-Tool — wir bauen die Seite buchungsbereit'] ],
 },
 physio:{
  label:'Physiotherapie', platzhalterName:'z.B. Physiotherapie Lindenhof', defaultOrt:'Aarau',
  zweckSatz:'Die meisten Physiotherapeutinnen wollen vor allem eins: dass Patienten sie finden, Vertrauen fassen und unkompliziert einen Termin anfragen. Stimmt das für dich?',
  welten:[ ['transparent','Modern & transparent','„die arbeiten zeitgemäss, keine Blackbox"'],
           ['ruhig','Warm & persönlich','„hier werde ich nicht als Nummer behandelt"'],
           ['klinisch','Klinisch & präzis','Welt in Arbeit',true] ],
  vertrauenFrage:'Was überzeugt jemanden, dass er bei DIR in guten Händen ist?',
  vertrauenOpts:[ ['quali','Qualifikation & Zulassung','dipl. FH, Weiterbildungen, Verbände'],
                  ['spez','Meine Spezialgebiete','Patienten suchen sehr gezielt'],
                  ['erfahrung','Meine Erfahrung','Jahre, Ansatz, Persönlichkeit'] ],
  hatSpez:true, hatReg:true, convClass:'trust',
  convFrage:'Wie sollen Patientinnen Kontakt aufnehmen?',
  convHint:'Kurze Frage, kurze Antwort — bei Vertrauensberufen ist der Kontaktweg selten das Problem.',
  convOpts:[ ['anruf','Anrufen','Nummer gut sichtbar'],
             ['formular','Anfrage-Formular','du meldest dich zurück'] ],
 }
};
const P = ()=>PROFILES[A.branche] || PROFILES.coiffeur;

/* ================= FRAGEN-PIPELINE (dynamisch aus Profil) ================= */
function buildSteps(){
 const p=P(); const st=[];
 st.push({ id:'F0', render(){ return q('Was machst du?','Wähle, was am ehesten passt.',
   [ opt('coiffeur','Coiffeur / Friseur'),
     opt('physio','Physiotherapie'),
     opt('treuhand','Treuhand','Profil vorhanden — Demo folgt',true),
     opt('andere','Etwas anderes','',false,'gate') ], 'branche'); },
   valid(){ return A.branche==='coiffeur'||A.branche==='physio'; } });

 st.push({ id:'F1', render(){ return `
   <div class="default-note">Wir legen offen, was wir annehmen — du kannst jederzeit widersprechen.</div>`
   + q(p.zweckSatz,'',
   [ opt('ja','Ja, genau'),
     opt('mehr','Ja, aber da ist noch mehr','nehmen wir im Review auf'),
     opt('nein','Nein, mir geht es um etwas anderes','',false,'gate') ], 'zweck'); },
   valid(){ return A.zweck==='ja'||A.zweck==='mehr'; } });

 st.push({ id:'F2', render(){ return q('Wenn jemand zum ersten Mal auf deine Seite kommt — was soll er spüren?',
   'Eine Frage, eine ganze Designwelt. Den Rest machen wir.',
   p.welten.map(w=>opt(w[0],w[1],w[2]||'',!!w[3])), 'charakter'); },
   valid(){ return p.welten.some(w=>!w[3]&&w[0]===A.charakter); } });

 st.push({ id:'F4', render(){ return q(p.vertrauenFrage,
   'Mehrfachauswahl möglich. (Vertrauen kommt bei uns vor der Technik.)',
   p.vertrauenOpts.map(o=>opt(o[0],o[1],o[2],false,null,true)), 'vertrauen'); },
   valid(){ return A.vertrauen.length>0; } });

 if(p.hatSpez) st.push({ id:'FS', skip(){ return !A.vertrauen.includes('spez'); },
   render(){ return q('Welche Spezialgebiete deckst du ab?','Sie werden zum Herzstück deiner Seite — Patienten suchen genau danach.',
   [ opt('sport','Sportphysiotherapie','',false,null,true),
     opt('manuell','Manuelle Therapie','',false,null,true),
     opt('lymph','Lymphdrainage','',false,null,true),
     opt('neuro','Neuro-Rehabilitation','',false,null,true) ], 'spez'); },
   valid(){ return A.spez.length>0; } });

 if(p.hatReg) st.push({ id:'FR', render(){ return `
   <div class="default-note">Diese Frage stellt dir kaum ein Website-Baukasten — dabei ist die Antwort für deine Patienten die wichtigste Info überhaupt.</div>`
   + q('Rechnest du über die Krankenkasse ab?','Die Antwort erscheint wortgetreu und prominent auf deiner Seite.',
   [ opt('grund','Ja, über die Grundversicherung','mit ärztlicher Verordnung'),
     opt('zusatz','Nur Zusatzversicherung & Selbstzahler','keine Verordnung nötig'),
     opt('beides','Beides','Grundversicherung mit Verordnung, direkt ohne') ], 'reg'); },
   valid(){ return !!A.reg; } });

 st.push({ id:'F3', render(){ return q(p.convFrage, p.convHint,
   p.convOpts.map(o=>opt(o[0],o[1],o[2])), 'conversion'); },
   valid(){ return !!A.conversion; } });

 st.push({ id:'FT', render(){ return q('Arbeitest du allein oder im Team?','',
   [ opt('allein','Allein','Die Seite erzählt DEINE Geschichte'),
     opt('team','Im Team','Team-Sektion mit euren Gesichtern') ], 'team'); },
   valid(){ return !!A.team; } });

 st.push({ id:'F5', render(){ return `
   <div class="frage"><h2>Ein paar Eckdaten.</h2>
   <p class="hint">Unfertiges kannst du später nachreichen — wir setzen solange Platzhalter.</p>
   <label>Name</label><input type="text" id="in-name" value="${A.name}" placeholder="${p.platzhalterName}">
   <label>Ort</label><input type="text" id="in-ort" value="${A.ort||p.defaultOrt}">
   <label>Telefon</label><input type="text" id="in-tel" value="${A.tel}">
   </div>`; },
   collect(){ A.name=v('in-name')|| (A.branche==='physio'?'Deine Praxis':'Dein Salon'); A.ort=v('in-ort')||'…'; A.tel=v('in-tel')||'000 000 00 00'; },
   valid(){ return true; } });

 st.push({ id:'REV', final:true, render(){ return reviewHtml(st); }, valid(){ return true; } });
 return st;
}
let steps = buildSteps();

/* ================= REVIEW ================= */
function idx(id){ return steps.findIndex(s=>s.id===id); }
function reviewHtml(st){
 const p=P();
 const weltLabel = (p.welten.find(w=>w[0]===A.charakter)||['','—'])[1];
 const convLabel = (p.convOpts.find(o=>o[0]===A.conversion)||['','—'])[1] + (A.conversion==='anruf'&&A.branche==='coiffeur'?' & WhatsApp':'');
 const edit=(id)=>{const i=idx(id); return i>-1?`<button class="edit" onclick="editStep(${i})" title="Antwort ändern">✎</button>`:'';};
 const bloecke=[];
 bloecke.push(['Start mit klarem '+(p.convClass==='trust'?'Weg zum Erstkontakt':'Termin-Weg'), 'F3']);
 if(A.branche==='physio' && A.reg){
   const regTxt={grund:'Grundversicherung mit Verordnung',zusatz:'Zusatz & Selbstzahler',beides:'Grundversicherung & direkt'}[A.reg];
   bloecke.push(['Kosten & Krankenkasse — prominent: '+regTxt, 'FR']);
 }
 if(A.branche==='physio' && A.vertrauen.includes('spez') && A.spez.length) bloecke.push(['Spezialgebiete: '+A.spez.length+' Bereiche', 'FS']);
 if(A.branche==='coiffeur' && A.vertrauen.includes('arbeiten')) bloecke.push(['Galerie: Deine Arbeiten', 'F4']);
 if(A.vertrauen.includes('quali')) bloecke.push(['Qualifikation & Zulassung', 'F4']);
 bloecke.push([A.branche==='physio'?'Behandlungsablauf (Transparenz)':'Leistungen & Preise (Beispielwerte)', null]);
 if(A.vertrauen.includes('bewertungen')) bloecke.push(['Kundenstimmen', 'F4']);
 bloecke.push([(A.team==='team'?(A.branche==='physio'?'Unser Praxisteam':'Unser Team'):'Über mich')+(A.vertrauen.includes('erfahrung')?' — mit deiner Geschichte':''), 'FT']);
 bloecke.push(['Kontakt & Öffnungszeiten', 'F5'], ['Impressum & Datenschutz (automatisch)', null]);
 return `<div class="frage"><h2>Dein Vorschlag, ${A.name||'—'}.</h2>
 <p class="hint">Das haben wir aus deinen Antworten gebaut. Mit ✎ änderst du die zugehörige Antwort — der Aufbau folgt.</p>
 <div class="review-box"><h3>Branche <span class="tag">${p.label}</span>${edit('F0')}</h3>
 <h3 style="margin-top:.8rem">Designwelt <span class="tag">${weltLabel}</span>${edit('F2')}</h3>
 <h3 style="margin-top:.8rem">${p.convClass==='trust'?'Kontakt-Weg':'Termin-Weg'} <span class="tag">${convLabel}</span>${edit('F3')}</h3></div>
 <div class="review-box"><h3>Aufbau deiner Seite</h3><ul>${bloecke.map(([b,id])=>'<li>'+b+(id?edit(id):'')+'</li>').join('')}</ul></div>
 <p class="hint">Im echten Produkt kommentierst du hier, was anders soll — ein Designer schaut vor Live-Gang drüber.</p>
 <button class="btn gen" onclick="generate()">Website ansehen →</button></div>`;
}

/* ================= RENDER-MECHANIK ================= */
function q(titel,hint,optionen,key){ window._key=key;
 return `<div class="frage"><h2>${titel}</h2>${hint?`<p class="hint">${hint}</p>`:''}${optionen.join('')}</div>`; }
function opt(val,label,small='',dis=false,gate=null,multi=false){
 return `<button class="opt ${dis?'dis':''}" data-v="${val}" data-gate="${gate||''}" data-multi="${multi?1:0}" ${dis?'disabled':''}>
   ${label}${small?`<small>${small}</small>`:''}</button>`; }
function v(id){ return document.getElementById(id)?.value.trim(); }
function multiKey(){ return window._key==='vertrauen'?A.vertrauen:(window._key==='spez'?A.spez:null); }

function render(){
 // übersprungene Schritte (skip) auslassen
 while(steps[step].skip && steps[step].skip()){ step++; }
 const s=steps[step];
 document.getElementById('prog').style.width=((step)/(steps.length-1)*100)+'%';
 let html=s.render();
 if(!s.final){
   html+=`<div class="nav">
     <button class="btn back" onclick="go(-1)" ${step===0?'style="visibility:hidden"':''}>← Zurück</button>
     <button class="btn next" id="btn-next" onclick="go(1)" ${s.valid()?'':'disabled'}>${returnToReview?'Zurück zum Vorschlag →':'Weiter →'}</button></div>`;
 } else {
   html+=`<div class="nav"><button class="btn back" onclick="go(-1)">← Zurück</button><span></span></div>`;
 }
 document.getElementById('stage').innerHTML=html;
 document.querySelectorAll('.opt:not(.dis)').forEach(b=>{
   const key=window._key; const mk=multiKey();
   if(mk? mk.includes(b.dataset.v) : A[key]===b.dataset.v) b.classList.add('sel');
   b.onclick=()=>{
     if(b.dataset.gate==='gate'){ showGate(); return; }
     if(b.dataset.multi==='1'){
       const arr=multiKey(); const i=arr.indexOf(b.dataset.v);
       i>-1?arr.splice(i,1):arr.push(b.dataset.v);
       b.classList.toggle('sel');
     } else {
       const alt=A[key]; A[key]=b.dataset.v;
       document.querySelectorAll('.opt').forEach(x=>x.classList.remove('sel'));
       b.classList.add('sel');
       if(key==='branche' && alt!==A.branche){ // Branchenwechsel: Profil-abhängige Antworten zurücksetzen, Pipeline neu
         A.zweck=null;A.charakter=null;A.vertrauen=[];A.spez=[];A.reg=null;A.conversion=null;A.team=null;A.name='';A.ort='';
         steps=buildSteps(); returnToReview=false;
       }
     }
     const n=document.getElementById('btn-next'); if(n) n.disabled=!steps[step].valid();
   };
 });
}
function showGate(){
 document.getElementById('stage').innerHTML=`<div class="gate">
   <h3>Dafür sind wir noch nicht gebaut.</h3>
   <p>Ehrlich gesagt: Das können wir noch nicht automatisch — aber genau solche Fälle bauen wir als Nächstes. Im echten Produkt kannst du dich hier vormerken lassen, und ein Mensch meldet sich.</p>
   <div class="nav"><button class="btn back" onclick="render()">← Andere Antwort wählen</button></div></div>`;
}
function editStep(i){ returnToReview=true; step=i; render(); }
function go(dir){
 const s=steps[step];
 if(dir>0 && s.collect) s.collect();
 if(returnToReview && dir>0){ returnToReview=false; step=steps.length-1; }
 else {
   step=step+dir;
   if(dir<0){ returnToReview=false; while(step>0 && steps[step].skip && steps[step].skip()) step--; }
   step=Math.max(0,Math.min(steps.length-1,step));
 }
 render();
}

/* ================= GENERIERUNG ================= */
function generate(){
 let html;
 if(A.branche==='physio') html = A.charakter==='ruhig' ? physioWarm() : physioTransparent();
 else html = A.charakter==='warm' ? weltWarm() : weltTrendig();
 document.getElementById('frame').srcdoc = html;
 document.getElementById('resultat').classList.add('on');
}
function closeResult(){ document.getElementById('resultat').classList.remove('on'); }
function tel(){ return A.tel.replace(/\s/g,''); }
function wa(){ return A.tel.replace(/\D/g,''); }

/* ---- Gemeinsame Bausteine ---- */
function stimmenHtml(cls){ return A.vertrauen.includes('bewertungen') ? `
 <section class="${cls}"><div class="wrap"><h2>${A.branche==='physio'?'Das sagen Patientinnen':'Das sagen Kundinnen'}</h2>
 <div class="zit"><p>«${A.branche==='physio'?'Zum ersten Mal hat mir jemand erklärt, WARUM wir was machen.':'Zum ersten Mal ein Schnitt, der auch nach drei Wochen noch sitzt.'}»</p><span>— S.</span></div>
 <div class="zit"><p>«${A.branche==='physio'?'Nach drei Monaten wieder schmerzfrei joggen — hätte ich nicht geglaubt.':'Ehrliche Beratung statt Verkaufsgespräch. Genau deshalb komme ich wieder.'}»</p><span>— M.</span></div>
 </div></section>` : ''; }
function ueberTitel(){ return A.team==='team' ? (A.branche==='physio'?'Unser Praxisteam':'Unser Team') : 'Über mich'; }
function ueberText(){
 const erf = A.vertrauen.includes('erfahrung') ? (A.branche==='physio'
   ? ' Seit über zwölf Jahren begleite ich Menschen zurück in ihre Bewegung.'
   : ' Seit acht Jahren führe ich diesen Salon — klein, persönlich und mit viel Zeit für dich.') : '';
 if(A.branche==='physio') return (A.team==='team'
   ? 'Wir sind ein kleines Team mit einem gemeinsamen Ansatz: Hände, Training und Zuhören verbinden.'
   : 'Mein Ansatz verbindet Hände, Training und Zuhören. Sie sollen verstehen, was wir tun und warum.')+erf;
 return (A.team==='team'
   ? 'Wir sind ein kleines Team mit einem gemeinsamen Anspruch: Frisuren, die zu deinem Alltag passen.'
   : 'Bei mir bekommst du keine Frisur von der Stange, sondern eine, die zu dir passt.')+erf;
}
function qualiHtml(){ return A.vertrauen.includes('quali') ? `
 <p class="quali">dipl. Physiotherapeutin FH<br>CAS Sportphysiotherapie (ESP)<br>Mitglied physioswiss</p>` : ''; }

/* Regulatorik: WÖRTLICH nach Antwort (I5 — Null-Freiheits-Zone) */
function regFakten(){
 if(A.reg==='grund') return ['Anerkannt von allen Schweizer Krankenkassen.','Abrechnung über die Grundversicherung mit ärztlicher Verordnung.','Verordnung vom Haus- oder Facharzt genügt — wir übernehmen die Administration.'];
 if(A.reg==='zusatz') return ['Abrechnung über Zusatzversicherung oder als Selbstzahler.','Keine ärztliche Verordnung nötig — Termin direkt vereinbaren.'];
 return ['Anerkannt von allen Schweizer Krankenkassen.','Abrechnung über die Grundversicherung mit ärztlicher Verordnung.','Zusatzversicherte und Selbstzahler: Termin auch ohne Verordnung möglich.'];
}
function spezCards(){
 const map={sport:['Sportphysiotherapie','Vom Wiedereinstieg nach Verletzung bis zur gezielten Leistungsvorbereitung.'],
   manuell:['Manuelle Therapie','Gezielte Behandlung von Gelenken, Muskulatur und Nervensystem.'],
   lymph:['Lymphdrainage','Sanfte Entstauungstherapie nach Operationen oder bei chronischen Schwellungen.'],
   neuro:['Neuro-Rehabilitation','Begleitung nach Schlaganfall, bei MS oder Parkinson — alltagsnah und geduldig.']};
 return A.spez.map(s=>`<div class="card"><h3>${map[s][0]}</h3><p>${map[s][1]}</p></div>`).join('');
}
function physioKontakt(){
 if(A.conversion==='formular') return `<p>Schreiben Sie kurz, worum es geht — Sie erhalten innert eines Arbeitstags eine Antwort.</p>
   <p style="font-family:monospace;font-size:.9rem;opacity:.7">[ Anfrage-Formular: Name · Anliegen · Verordnung vorhanden? ]</p>`;
 return `<p>Rufen Sie an — wir finden gemeinsam einen passenden Termin.</p>`;
}
function coifConvHero(dark){
 const c = dark?'#d99a3d':'#e6007e';
 if(A.conversion==='anruf') return `<span style="display:inline-flex;gap:1.2rem;align-items:center;flex-wrap:wrap">
   <a href="tel:${tel()}" style="font-size:1.5rem;font-weight:700;color:${c};text-decoration:none">📞 ${A.tel}</a>
   <a href="https://wa.me/${wa()}" style="font-weight:700;color:${c};text-decoration:none;border:2px solid ${c};padding:.4rem .9rem;border-radius:999px">WhatsApp</a></span>`;
