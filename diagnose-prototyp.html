<style>
  :root{--ink:#1c2528;--bg:#f6f4ef;--acc:#0e4f5c;--soft:#dfe7e3;--warn:#b3562e;

  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:var(--fb);background:var(--bg);color:var(--ink);font-size:17px;line-height:1.55}
  .app{max-width:640px;margin:0 auto;padding:2.5rem 1.2rem 5rem}
  h1{font-family:var(--fd);font-weight:600;font-size:1.5rem;margin-bottom:.4rem}
  .sub{color:#5a6a6e;font-size:.95rem;margin-bottom:2rem}
  .progress{height:4px;background:var(--soft);border-radius:2px;margin-bottom:2.2rem;overflow:hidden}
  .progress i{display:block;height:100%;background:var(--acc);width:0;transition:width .3s}
  .frage h2{font-family:var(--fd);font-weight:600;font-size:1.3rem;line-height:1.3;margin-bottom:.5rem}
  .frage .hint{color:#5a6a6e;font-size:.92rem;margin-bottom:1.4rem}
  .opt{display:block;width:100%;text-align:left;background:#fff;border:2px solid var(--soft);border-radius:10px;
    padding:.95rem 1.1rem;margin-bottom:.7rem;cursor:pointer;font:inherit;transition:border-color .15s}
  .opt:hover{border-color:var(--acc)}
  .opt.sel{border-color:var(--acc);background:#eef4f3}
  .opt small{display:block;color:#5a6a6e;font-size:.85rem;margin-top:.15rem}
  .opt.dis{opacity:.45;cursor:not-allowed}
  label{display:block;font-weight:600;font-size:.9rem;margin:1rem 0 .3rem}
  input[type=text]{width:100%;padding:.7rem .9rem;border:2px solid var(--soft);border-radius:8px;font:inherit;background:#fff}
  input[type=text]:focus{outline:none;border-color:var(--acc)}
  .nav{display:flex;justify-content:space-between;gap:1rem;margin-top:2rem}
  .btn{font:inherit;font-weight:600;padding:.75rem 1.5rem;border-radius:999px;border:none;cursor:pointer}
  .btn.next{background:var(--acc);color:#fff}
  .btn.next:disabled{opacity:.4;cursor:not-allowed}
  .btn.back{background:none;color:#5a6a6e}
  .btn.gen{background:var(--warn);color:#fff;font-size:1.05rem;padding:.9rem 2rem}
  .default-note{background:#eef4f3;border-left:4px solid var(--acc);padding:.8rem 1rem;font-size:.9rem;border-radius:0 8px 8px 0;margin-bottom:1.4rem}
  .gate{background:#fdf1ec;border:2px solid var(--warn);border-radius:10px;padding:1.3rem}
  .gate h3{font-family:var(--fd);margin-bottom:.5rem}
  .review-box{background:#fff;border:2px solid var(--soft);border-radius:10px;padding:1.3rem;margin-bottom:1rem}
  .review-box h3{font-family:var(--fd);font-size:1.05rem;margin-bottom:.6rem}
  .review-box ul{padding-left:1.2rem;font-size:.95rem}
  .review-box li{margin-bottom:.3rem}
  .tag{display:inline-block;background:var(--soft);border-radius:4px;padding:.1rem .5rem;font-size:.8rem;margin-left:.4rem}
  .edit{font:inherit;background:none;border:none;color:var(--acc);cursor:pointer;font-size:.95rem;margin-left:.5rem;padding:.1rem .3rem;border-radius:4px}
  .edit:hover{background:var(--soft)}
  #resultat{display:none;position:fixed;inset:0;background:#fff;z-index:100;flex-direction:column}
  #resultat.on{display:flex}
  .res-bar{background:var(--ink);color:#fff;padding:.6rem 1rem;display:flex;justify-content:space-between;align-items:center;font-size:.9rem}
  .res-bar button{font:inherit;background:#fff;color:var(--ink);border:none;border-radius:999px;padding:.4rem 1rem;cursor:pointer;font-weight:600}
  #frame{flex:1;border:none;width:100%}
</style>
</head>

  <div id="stage"></div>
</div>

<div id="resultat">

    <button onclick="closeResult()">← Zurück zum Fragebogen</button>

  <iframe id="frame" title="Website-Vorschlag"></iframe>
</div>

function buildSteps(){
 const p=P(); const st=[];
 st.push({ id:'F0', render(){ return q('Was machst du?','Wähle, was am ehesten passt.',

   valid(){ return BRANCHEN.includes(A.branche); } });

 st.push({ id:'F1', render(){ return `
   <div class="default-note">Wir legen offen, was wir annehmen — du kannst jederzeit widersprechen.</div>`
   + q(p.zweckSatz,'',
   [ opt('ja','Ja, genau'),
     opt('mehr','Ja, aber da ist noch mehr','nehmen wir im Review auf'),
     opt('nein','Nein, mir geht es um etwas anderes','',false,'gate') ], 'zweck'); },
   valid(){ return A.zweck==='ja'||A.zweck==='mehr'; } });

 st.push({ id:'F2', render(){ return q('Wenn jemand zum ersten Mal auf deine Seite kommt — was soll er spüren?',
   'Eine Frage, eine ganze Designwelt. Den Rest machen wir.',
   p.welten.map(w=>opt(w[0],w[1],w[2]||'',!!w[3])), 'charakter'); },
   valid(){ return p.welten.some(w=>!w[3]&&w[0]===A.charakter); } });

 st.push({ id:'F4', render(){ return q(p.vertrauenFrage,
   'Mehrfachauswahl möglich. (Vertrauen kommt bei uns vor der Technik.)',
   p.vertrauenOpts.map(o=>opt(o[0],o[1],o[2],false,null,true)), 'vertrauen'); },
   valid(){ return A.vertrauen.length>0; } });

 if(p.hatSpez) st.push({ id:'FS', skip(){ return !A.vertrauen.includes('spez'); },
   render(){ return q(p.spezFrage, p.spezHint,
   p.spezOpts.map(o=>opt(o[0],o[1],'',false,null,true)), 'spez'); },
   valid(){ return A.spez.length>0; } });

 if(p.hatReg) st.push({ id:'FR', render(){ return `

   valid(){ return !!A.reg; } });

 st.push({ id:'F3', render(){ return q(p.convFrage, p.convHint,
   p.convOpts.map(o=>opt(o[0],o[1],o[2])), 'conversion'); },
   valid(){ return !!A.conversion; } });

 st.push({ id:'FT', render(){ return q('Arbeitest du allein oder im Team?','',
   [ opt('allein','Allein','Die Seite erzählt DEINE Geschichte'),
     opt('team','Im Team','Team-Sektion mit euren Gesichtern') ], 'team'); },
   valid(){ return !!A.team; } });

 st.push({ id:'F5', render(){ return `
   <div class="frage"><h2>Ein paar Eckdaten.</h2>
   <p class="hint">Unfertiges kannst du später nachreichen — wir setzen solange Platzhalter.</p>
   <label>Name</label><input type="text" id="in-name" value="${A.name}" placeholder="${p.platzhalterName}">
   <label>Ort</label><input type="text" id="in-ort" value="${A.ort||p.defaultOrt}">
   <label>Telefon</label><input type="text" id="in-tel" value="${A.tel}">
   </div>`; },
   collect(){ A.name=v('in-name')|| P().defaultBusinessNoun; A.ort=v('in-ort')||'…'; A.tel=v('in-tel')||'000 000 00 00'; },
   valid(){ return true; } });

 st.push({ id:'REV', final:true, render(){ return reviewHtml(st); }, valid(){ return true; } });
 return st;
}

function idx(id){ return steps.findIndex(s=>s.id===id); }
function reviewHtml(st){
 const p=P();
 const weltLabel = (p.welten.find(w=>w[0]===A.charakter)||['','—'])[1];
 const convLabel = (p.convOpts.find(o=>o[0]===A.conversion)||['','—'])[1];
 const edit=(id)=>{const i=idx(id); return i>-1?`<button class="edit" onclick="editStep(${i})" title="Antwort ändern">✎</button>`:'';};
 const bloecke=[];
 bloecke.push(['Start mit klarem '+(p.convClass==='trust'?'Weg zum Erstkontakt':'Termin-/Anfrage-Weg'), 'F3']);
 if(p.hatReg && A.reg){
   const regTxt={grund:'Grundversicherung mit Verordnung',zusatz:'Zusatz & Selbstzahler',beides:'Grundversicherung & direkt'}[A.reg];
   bloecke.push(['Kosten & Krankenkasse — prominent: '+regTxt, 'FR']);
 }
 if(p.hatSpez && A.vertrauen.includes('spez') && A.spez.length) bloecke.push([p.spezLabel+': '+A.spez.length+' Bereiche', 'FS']);
 if(p.galerieImmer || (p.hatGalerieToggle && A.vertrauen.includes('arbeiten'))) bloecke.push(['Galerie: Deine Arbeiten', 'F4']);
 if(A.vertrauen.includes('quali')) bloecke.push(['Qualifikation & Zulassung', 'F4']);
 if(A.branche==='tatowierer' && A.vertrauen.includes('hygiene')) bloecke.push(['Hygiene & Sicherheit', 'F4']);
 bloecke.push([p.hatAblauf?(p.ablaufLabel||'Ablauf (Transparenz)'):'Leistungen & Preise (Beispielwerte)', null]);
 if(A.vertrauen.includes('bewertungen')) bloecke.push(['Kundenstimmen', 'F4']);
 bloecke.push([(A.team==='team'?p.teamLabel:'Über mich')+(A.vertrauen.includes('erfahrung')?' — mit deiner Geschichte':''), 'FT']);
 bloecke.push(['Kontakt & Öffnungszeiten', 'F5'], ['Impressum & Datenschutz (automatisch)', null]);
 return `<div class="frage"><h2>Dein Vorschlag, ${A.name||'—'}.</h2>
 <p class="hint">Das haben wir aus deinen Antworten gebaut. Mit ✎ änderst du die zugehörige Antwort — der Aufbau folgt.</p>
 <div class="review-box"><h3>Branche <span class="tag">${p.label}</span>${edit('F0')}</h3>
 <h3 style="margin-top:.8rem">Designwelt <span class="tag">${weltLabel}</span>${edit('F2')}</h3>
 <h3 style="margin-top:.8rem">${p.convClass==='trust'?'Kontakt-Weg':'Termin-/Anfrage-Weg'} <span class="tag">${convLabel}</span>${edit('F3')}</h3></div>
 <div class="review-box"><h3>Aufbau deiner Seite</h3><ul>${bloecke.map(([b,id])=>'<li>'+b+(id?edit(id):'')+'</li>').join('')}</ul></div>
 <p class="hint">Im echten Produkt kommentierst du hier, was anders soll — ein Designer schaut vor Live-Gang drüber.</p>
 <button class="btn gen" onclick="generate()">Website ansehen →</button></div>`;
}

/* ================= RENDER-MECHANIK ================= */
function q(titel,hint,optionen,key){ window._key=key;
 return `<div class="frage"><h2>${titel}</h2>${hint?`<p class="hint">${hint}</p>`:''}${optionen.join('')}</div>`; }
function opt(val,label,small='',dis=false,gate=null,multi=false){
 return `<button class="opt ${dis?'dis':''}" data-v="${val}" data-gate="${gate||''}" data-multi="${multi?1:0}" ${dis?'disabled':''}>
   ${label}${small?`<small>${small}</small>`:''}</button>`; }
function v(id){ return document.getElementById(id)?.value.trim(); }
function multiKey(){ return window._key==='vertrauen'?A.vertrauen:(window._key==='spez'?A.spez:null); }

function render(){
 // übersprungene Schritte (skip) auslassen
 while(steps[step].skip && steps[step].skip()){ step++; }
 const s=steps[step];
 document.getElementById('prog').style.width=((step)/(steps.length-1)*100)+'%';
 let html=s.render();
 if(!s.final){
   html+=`<div class="nav">
     <button class="btn back" onclick="go(-1)" ${step===0?'style="visibility:hidden"':''}>← Zurück</button>
     <button class="btn next" id="btn-next" onclick="go(1)" ${s.valid()?'':'disabled'}>${returnToReview?'Zurück zum Vorschlag →':'Weiter →'}</button></div>`;
 } else {
   html+=`<div class="nav"><button class="btn back" onclick="go(-1)">← Zurück</button><span></span></div>`;
 }
 document.getElementById('stage').innerHTML=html;
 document.querySelectorAll('.opt:not(.dis)').forEach(b=>{
   const key=window._key; const mk=multiKey();
   if(mk? mk.includes(b.dataset.v) : A[key]===b.dataset.v) b.classList.add('sel');
   b.onclick=()=>{
     if(b.dataset.gate==='gate'){ showGate(); return; }
     if(b.dataset.multi==='1'){
       const arr=multiKey(); const i=arr.indexOf(b.dataset.v);
       i>-1?arr.splice(i,1):arr.push(b.dataset.v);
       b.classList.toggle('sel');
     } else {
       const alt=A[key]; A[key]=b.dataset.v;
       document.querySelectorAll('.opt').forEach(x=>x.classList.remove('sel'));
       b.classList.add('sel');
       if(key==='branche' && alt!==A.branche){ // Branchenwechsel: Profil-abhängige Antworten zurücksetzen, Pipeline neu
         A.zweck=null;A.charakter=null;A.vertrauen=[];A.spez=[];A.reg=null;A.conversion=null;A.team=null;A.name='';A.ort='';
         steps=buildSteps(); returnToReview=false;
       }
     }
     const n=document.getElementById('btn-next'); if(n) n.disabled=!steps[step].valid();
   };
 });
}
function showGate(){
 document.getElementById('stage').innerHTML=`<div class="gate">
   <h3>Dafür sind wir noch nicht gebaut.</h3>
   <p>Ehrlich gesagt: Das können wir noch nicht automatisch — aber genau solche Fälle bauen wir als Nächstes. Im echten Produkt kannst du dich hier vormerken lassen, und ein Mensch meldet sich.</p>
   <div class="nav"><button class="btn back" onclick="render()">← Andere Antwort wählen</button></div></div>`;
}
function editStep(i){ returnToReview=true; step=i; render(); }
function go(dir){
 const s=steps[step];
 if(dir>0 && s.collect) s.collect();
 if(returnToReview && dir>0){ returnToReview=false; step=steps.length-1; }
 else {
   step=step+dir;
   if(dir<0){ returnToReview=false; while(step>0 && steps[step].skip && steps[step].skip()) step--; }
   step=Math.max(0,Math.min(steps.length-1,step));
 }
 render();
}

function resolveLayout(rules, count) {
  for (const r of rules) {
    if (count >= r.min && (r.max === null || count <= r.max)) {
      const eff = r.cap ? Math.min(count, r.cap) : count;
      return {layout: r.layout, effectiveCount: eff, cap: r.cap};
    }
  }
  return {layout:'hidden', effectiveCount:0, cap:null};
}
function fontUrl(world) {
  const f = world.design_tokens.fonts;
  const gs = Object.values(f).filter(Boolean).map(x => 'family=' + x.google).join('&');
  return `https://fonts.googleapis.com/css2?${gs}&display=swap`;
}

}

/* ================= BEFÜLLUNG: Inhalt + Mengen aus echten Antworten (kein Test-Schalter) =================
   - quotesN: 0 wenn 'bewertungen' nicht wählbar/gewählt, sonst feste Pool-Grösse
   - galleryN: galerieImmer (Tätowierer, craft_slider 95) → immer 4; hatGalerieToggle (Coiffeur) →
     4 wenn 'arbeiten' gewählt; sonst (Physio, Treuhänder — kein gallery_portfolio im echten Profil) → 0
   - factsN: hatReg-Branchen (Physio, Ernährungsberatung) — Länge von regFakten(); Tätowierer — Hygiene-Fakten
     wenn 'hygiene' gewählt; sonst 0
   - spez_items: genau die gewählten Einträge aus p.spezOpts (1–4), Titel/Text aus p.spezMap */
function buildContent(){
 const p = P();
 const factsAll = p.hatReg ? regFakten() : (A.branche==='tatowierer' ? (p.hygieneFacts||[]) : []);
 const factsActive = p.hatReg ? true : (A.branche==='tatowierer' ? A.vertrauen.includes('hygiene') : false);
 return {
   name:A.name, ort:A.ort,
   headline1:p.headline1, headline2:p.headline2, tagline:p.tagline, branch_label:p.branchLabel, audience:p.audience,
   over_titel: ueberTitel(), over_text: ueberText(),
   quotes_all: p.quotesPool,
   quotesN: A.vertrauen.includes('bewertungen') ? p.quotesPool.length : 0,
   gallery_images: DUMMY_IMAGES,
   galleryN: p.galerieImmer ? 4 : ((p.hatGalerieToggle && A.vertrauen.includes('arbeiten')) ? 4 : 0),
   facts_all: factsActive ? factsAll : [],
   factsN: factsActive ? factsAll.length : 0,
   fakten_title: p.hatReg ? p.faktenTitelReg : (A.branche==='tatowierer' ? p.faktenTitelHygiene : null),
   spez_items: (p.hatSpez && A.vertrauen.includes('spez')) ? A.spez.map(s=>({title:p.spezMap[s][0], text:p.spezMap[s][1]})) : [],
   spezLabel: p.spezLabel,
   preise: p.preise,
   ctaLabelKontakt: p.ctaLabelKontakt
 };
}

    ${c.headline1} <em style="font-style:normal;color:${t.primary};font-weight:400">${c.headline2}</em></h1>

</div></header>
${factsHtml()}
${galleryHtml()}
${c.preise.length ? preiseHtml_modern(c,t,mono,eyebrow) : ''}
${c.spez_items.length ? spezHtml_modern(c,t,f,r,eyebrow) : ''}
${ablaufHtml()}
${quotesHtml()}
<section><div class="wrap">${eyebrow(c.over_titel)}<p style="max-width:52ch;margin-top:.4rem">${c.over_text}</p>${qualiHtml(t.primary)}</div></section>
<section class="kontakt" id="t"><div class="wrap">${eyebrow('Kontakt')}
  <h2 style="font-family:'${f.display.family}',sans-serif;font-weight:600;font-size:1.9rem;margin-bottom:.8rem">${c.ctaLabelKontakt}</h2>

  <p style="margin-top:.6rem"><a style="font-weight:600;font-size:1.6rem;color:${t.accent};text-decoration:none" href="tel:${tel()}">${A.tel}</a><br>${c.name} · ${c.ort}</p>
</div></section>

function renderTrendigMutig(world, c) {
  const t = world.design_tokens.colors, f = world.design_tokens.fonts;
  const qr = world.quantity_rules, mono = f.utility_mono.family;

  const qL = resolveLayout(qr.quotes, c.quotesN);
  const gL = resolveLayout(qr.gallery_items, c.galleryN);
  const fL = resolveLayout(qr.facts, c.factsN);
  const quotes = c.quotes_all.slice(0, qL.effectiveCount);
  const facts  = c.facts_all.slice(0, fL.effectiveCount);

  function factsHtml(){
    if(fL.layout==='hidden' || !facts.length) return '';
    if(fL.layout==='inline_facts') return `
      <section style="padding:3.5rem 0"><div class="wrap">
        <p style="font-family:'${mono}';font-size:.75rem;text-transform:uppercase;letter-spacing:.1em;color:${t.muted};margin-bottom:.6rem">${c.fakten_title}</p>
        ${facts.map(ft=>`<p style="font-family:'${mono}';font-size:.9rem;margin-bottom:.3rem">— ${ft}</p>`).join('')}
      </div></section>`;
    return `
      <section style="background:${t.primary};color:${t.surface_base};padding:4.5rem 0"><div class="wrap">
        <h2 style="font-family:'${f.display.family}';font-size:clamp(2rem,5vw,3rem);text-transform:uppercase;margin-bottom:1.2rem;line-height:.95">${(c.fakten_title||'').toUpperCase()}.</h2>
        <ul style="font-family:'${mono}';font-size:.9rem;line-height:2;list-style:none;border-left:4px solid ${t.accent};padding-left:1.4rem">
          ${facts.map(ft=>`<li style="border-bottom:1px solid rgba(245,243,238,.15);padding:.3rem 0">${ft}</li>`).join('')}
        </ul></div></section>`;
  }
  function spezHtml_trendig(){
    if(!c.spez_items.length) return '';
    if(c.spez_items.length===1){ const s=c.spez_items[0]; return `
      <section style="background:${t.primary};padding:5rem 0"><div class="wrap">
        <p style="font-family:'${f.display.family}';font-size:clamp(1.8rem,5vw,3rem);color:${t.surface_base};text-transform:uppercase;border-left:8px solid ${t.accent};padding-left:1.5rem">${s.title}</p>
        <p style="margin-top:1rem;padding-left:calc(1.5rem + 8px);color:${t.muted};max-width:52ch">${s.text}</p>
      </div></section>`; }
    return `<section style="padding:4rem 0"><div class="wrap">
      <h2 style="font-family:'${f.display.family}';font-size:clamp(2rem,5vw,3rem);text-transform:uppercase;margin-bottom:1.5rem;line-height:.95">${c.spezLabel}.</h2>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
        ${c.spez_items.map(s=>`<div style="border:2px solid ${t.text};padding:1.2rem"><h3 style="font-family:'${f.display.family}';font-size:1.3rem;text-transform:uppercase;margin-bottom:.4rem">${s.title}</h3><p style="font-size:.9rem">${s.text}</p></div>`).join('')}
      </div></div></section>`;
  }

  function quotesHtml(){
    if(qL.layout==='hidden') return '';
    if(qL.layout==='solo_large') return `
      <section style="background:${t.primary};padding:5rem 0"><div class="wrap">
        <p style="font-family:'${f.display.family}';font-size:clamp(1.8rem,5vw,3.2rem);color:${t.surface_base};line-height:1.05;text-transform:uppercase;border-left:8px solid ${t.accent};padding-left:1.5rem">«${quotes[0].text}»</p>
        <p style="margin-top:1.2rem;padding-left:calc(1.5rem + 8px);font-family:'${mono}';font-size:.85rem;color:${t.muted}">— ${quotes[0].who}</p></div></section>`;
    return `
      <section style="padding:4rem 0"><div class="wrap"><h2 style="font-family:'${f.display.family}';font-size:clamp(2rem,5vw,3rem);text-transform:uppercase;margin-bottom:1.5rem;line-height:.95">Stimmen.</h2>
        <div style="display:flex;flex-direction:column;gap:1.2rem">
          ${quotes.map(q=>`<div style="border-left:6px solid ${t.accent};padding:.6rem 0 .6rem 1.2rem"><p style="font-size:1.1rem;font-weight:700;line-height:1.4">«${q.text}»</p><p style="font-family:'${mono}';font-size:.8rem;color:${t.muted};margin-top:.3rem">— ${q.who}</p></div>`).join('')}
        </div></div></section>`;
  }
  function photoCell(i,label,extraStyle){ const src=c.gallery_images[i%c.gallery_images.length]; return `<div style="aspect-ratio:3/2;background:url('${src}') center/cover;position:relative;overflow:hidden;${extraStyle||''}">
      <div style="position:absolute;inset:0;background:linear-gradient(180deg,rgba(13,13,13,.15),rgba(13,13,13,.6))"></div>
      <span style="position:absolute;bottom:.5rem;left:.5rem;font-family:'${mono}';font-size:.65rem;color:${t.surface_base};background:${t.primary};padding:.2rem .5rem;z-index:1">${label}</span></div>`; }
  function galleryHtml(){
    if(gL.layout==='hidden') return '';
    const n=gL.effectiveCount;
    if(gL.layout==='feature_single'){ const cols=n===1?'1fr':'3fr 2fr'; return `
      <section class="wrap" style="padding:4rem 0"><h2 style="font-family:'${f.display.family}';font-size:clamp(2rem,5vw,3rem);text-transform:uppercase;margin-bottom:1rem;line-height:.95">Arbeiten.</h2>
      <div style="display:grid;grid-template-columns:${cols};gap:.6rem">${Array(n).fill(0).map((_,i)=>photoCell(i,`Beispiel ${i+1}`)).join('')}</div></section>`; }
    const staggerCfg=[{col:'1/6',mt:'0'},{col:'6/10',mt:'2rem'},{col:'10/13',mt:'-1rem'},{col:'1/7',mt:'1.5rem'},{col:'7/13',mt:'0'}];
    const cellsCount=Math.min(n,staggerCfg.length);
    return `<section class="wrap" style="padding:4rem 0"><h2 style="font-family:'${f.display.family}';font-size:clamp(2rem,5vw,3rem);text-transform:uppercase;margin-bottom:1rem;line-height:.95">Arbeiten.</h2>
      <div style="display:grid;grid-template-columns:repeat(12,1fr);gap:.6rem">
        ${staggerCfg.slice(0,cellsCount).map((cfg,i)=>photoCell(i,'Portfolio',`grid-column:${cfg.col};margin-top:${cfg.mt}`)).join('')}
      </div></section>`;
  }

  const marquee='Schnitt — Farbe — Balayage — Styling — ';
  const css = `
    *{margin:0;padding:0;box-sizing:border-box}body{font-family:'${f.body.family}',sans-serif;background:${t.surface_base};color:${t.text};line-height:1.55}
    .wrap{max-width:1100px;margin:auto;padding:0 1.2rem}
    .cta{background:${t.accent};color:${t.surface_base};font-weight:700;text-transform:uppercase;letter-spacing:.06em;text-decoration:none;padding:.7rem 1.4rem;display:inline-block}
    .kontakt{background:${t.accent};color:${t.primary}}
    footer{background:${t.primary};color:${t.muted};font-size:.85rem;padding:1.2rem 0}
    footer .wrap{display:flex;justify-content:space-between;flex-wrap:wrap;gap:1rem}footer a{color:${t.surface_base}}
    @keyframes mq{to{transform:translateX(-50%)}}
    @media(prefers-reduced-motion:reduce){.mq-inner{animation:none}}`;

  return `<!doctype html><html lang="de-CH"><head><meta charset="utf-8">
<link href="${fontUrl(world)}" rel="stylesheet"><style>${css}</style></head><body>
<header style="background:${t.primary};color:${t.surface_base};padding:4rem 0 0"><div class="wrap">
  <h1 style="font-family:'${f.display.family}';font-size:clamp(3.2rem,12vw,8rem);line-height:.9;text-transform:uppercase">
    ${c.headline1.toUpperCase()}<span style="color:${t.accent};display:block;margin-left:6vw">${c.headline2.toUpperCase()}</span></h1>
  <div style="display:flex;gap:1.5rem;align-items:center;margin:1.8rem 0 3rem;flex-wrap:wrap">
    ${heroCtaHtml(t,{button:'0'})}
    <p style="max-width:32ch;color:${t.muted}">${c.tagline}</p>
  </div></div>
  <div style="height:26vh;position:relative;overflow:hidden">
    <div style="position:absolute;inset:0;background:url('${DUMMY_IMAGES[0]}') center/cover"></div>
    <div style="position:absolute;inset:0;background:linear-gradient(120deg,rgba(42,42,42,.55),rgba(17,17,17,.85))"></div>
  </div></header>
<div style="background:${t.accent};overflow:hidden;padding:.4rem 0;font-family:'${f.display.family}';text-transform:uppercase;white-space:nowrap;font-size:.85rem;letter-spacing:.04em" aria-hidden="true">
  <span class="mq-inner" style="display:inline-block;padding-right:3rem;animation:mq 18s linear infinite">${marquee.repeat(4)}</span></div>
${galleryHtml()}
${c.spez_items.length ? spezHtml_trendig() : ''}
${factsHtml()}
${c.preise.length ? preiseHtml_trendig(c,t,f,mono) : ''}
${quotesHtml()}
<section style="padding:4rem 0"><div class="wrap"><p style="max-width:52ch">${c.over_text}</p></div></section>
<section class="kontakt" id="t"><div class="wrap" style="padding:4rem 0">
  <h2 style="font-family:'${f.display.family}';font-size:clamp(2rem,5vw,3rem);text-transform:uppercase;margin-bottom:1rem;line-height:.95">${c.ctaLabelKontakt.toUpperCase()}.</h2>
  ${kontaktBodyHtml(mono)}
  <a style="font-family:'${f.display.family}';font-size:clamp(1.8rem,4.5vw,3rem);text-decoration:none;text-transform:uppercase;display:block;margin:.6rem 0" href="tel:${tel()}">${A.tel}</a>
  <span style="font-family:'${mono}';font-size:.9rem">${c.name} · ${c.ort}</span>
</div></section>
<footer><div class="wrap"><span>© 2026 ${c.name}</span><span><a href="#">Impressum</a> · <a href="#">Datenschutz</a></span></div></footer>
</body></html>`;
}

function renderGehobenElegant(world, c) {
  const t = world.design_tokens.colors, f = world.design_tokens.fonts;
  const qr = world.quantity_rules;
  const muted = t.text_muted;

  const qL = resolveLayout(qr.quotes, c.quotesN);
  const gL = resolveLayout(qr.gallery_items, c.galleryN);
  const fL = resolveLayout(qr.facts, c.factsN);
  const quotes = c.quotes_all.slice(0, qL.effectiveCount);
  const facts  = c.facts_all.slice(0, fL.effectiveCount);
  const sep = `<div style="height:1px;background:rgba(28,36,32,.15);margin:0"></div>`;

  function quotesHtml(){
    if(qL.layout==='hidden') return '';
    return `${sep}<section style="padding:8rem 0;text-align:center"><div class="wrap">
      <p style="font-family:'${f.display.family}',serif;font-style:italic;font-weight:300;font-size:clamp(2rem,4vw,3.2rem);line-height:1.2;max-width:26ch;margin:0 auto;color:${t.primary}">«${quotes[0].text}»</p>
      <p style="margin-top:1.5rem;font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;color:${muted}">— ${quotes[0].who}</p></div></section>`;
  }
  function galleryHtml(){
    if(gL.layout==='hidden') return '';
    const n=gL.effectiveCount;
    const cols = n===1?'1fr':n===2?'1fr 1fr':'1fr 1fr 1fr';
    return `${sep}<section style="padding:7rem 0;text-align:center"><div class="wrap">
      <h2 style="font-family:'${f.display.family}',serif;font-weight:300;font-size:2rem;margin-bottom:2rem;line-height:1.15">Unsere <em style="font-style:italic">Arbeiten</em></h2>
      <div style="display:grid;grid-template-columns:${cols};gap:2rem">
        ${Array(n).fill(0).map((_,i)=>`<div style="aspect-ratio:3/2;background:url('${c.gallery_images[i%c.gallery_images.length]}') center/cover;filter:sepia(.25) saturate(.55) brightness(1.02)"></div>`).join('')}
      </div></div></section>`;
  }
  function factsHtml(){
    if(fL.layout==='hidden' || !facts.length) return '';
    if(fL.layout==='inline_facts') return `
      ${sep}<section style="padding:6rem 0"><div class="wrap">
        <p style="font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;color:${t.accent};margin-bottom:.8rem">${c.fakten_title}</p>
        <div style="border-left:1px solid ${t.accent};padding-left:1.4rem">${facts.map(ft=>`<p style="font-size:.95rem;margin-bottom:.4rem;color:${muted}">— ${ft}</p>`).join('')}</div>
      </div></section>`;
    return `
      ${sep}<section style="padding:6rem 0"><div class="wrap">
        <h2 style="font-family:'${f.display.family}',serif;font-weight:300;font-size:2rem;margin-bottom:1.8rem;line-height:1.15"><em style="font-style:italic">${c.fakten_title}</em></h2>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:2rem;align-items:start">
          <p style="color:${muted};font-size:.95rem;line-height:1.7">Damit Sie sich um Ihre Genesung kümmern können — nicht um Formulare.</p>
          <ul style="border:1px solid rgba(26,24,20,.2);padding:1.8rem;list-style:none;border-radius:2px">
            ${facts.map(ft=>`<li style="padding:.4rem 0;border-bottom:1px solid rgba(26,24,20,.1);font-size:.9rem;color:${t.primary};padding-left:1rem;position:relative"><span style="position:absolute;left:0;color:${t.accent}">—</span>${ft}</li>`).join('')}
          </ul></div></div></section>`;
  }
  function ablaufHtml(){
    if(!P().hatAblauf) return '';
    return `${sep}<section style="padding:6rem 0;text-align:center"><div class="wrap">
      <h2 style="font-family:'${f.display.family}',serif;font-weight:300;font-size:2rem;margin-bottom:2rem;line-height:1.15">So <em style="font-style:italic">begleiten wir Sie</em></h2>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:2rem">
        ${P().ablaufSteps.map(([h,p],i)=>`<div><span style="font-family:'${f.display.family}',serif;font-weight:300;font-size:1.8rem;color:${t.accent};display:block;margin-bottom:.4rem">${i+1}</span><h3 style="font-size:1rem;margin-bottom:.3rem;color:${t.primary}">${h}</h3><p style="font-size:.9rem;color:${muted}">${p}</p></div>`).join('')}
      </div></div></section>`;
  }

  const css = `
    *{margin:0;padding:0;box-sizing:border-box}body{font-family:'${f.body.family}',sans-serif;background:${t.surface_base};color:${t.primary};line-height:1.7;font-weight:300}
    .wrap{max-width:900px;margin:auto;padding:0 1.5rem}
    .cta{border:1px solid ${t.primary};color:${t.primary};font-size:.85rem;letter-spacing:.1em;text-decoration:none;padding:.65rem 1.8rem;display:inline-block}
    footer{border-top:1px solid rgba(28,36,32,.15);padding:1.2rem 0;font-size:.8rem;color:${muted}}
    footer .wrap{display:flex;justify-content:space-between;gap:1rem;max-width:1020px}footer a{color:${muted}}`;

  return `<!doctype html><html lang="de-CH"><head><meta charset="utf-8">
<link href="${fontUrl(world)}" rel="stylesheet"><style>${css}</style></head><body>
<header style="padding:8rem 0;text-align:center"><div class="wrap">
  <div style="width:2.5rem;height:1px;background:${t.accent};margin:0 auto 2rem"></div>
  <h1 style="font-family:'${f.display.family}',serif;font-weight:300;font-size:clamp(2.2rem,3.6vw,3.6rem);line-height:1.15;max-width:22ch;margin:0 auto">
    ${c.headline1} <em style="font-style:italic">${c.headline2}</em></h1>
  <p style="max-width:38ch;margin:1.6rem auto 2.2rem;color:${muted};font-size:.95rem">${c.tagline}</p>
  ${heroCtaHtml(t,{button:'0'})}
</div></header>
${sep}
${factsHtml()}
${galleryHtml()}
${c.preise.length ? preiseHtml_gehoben(c,t,f,muted,sep) : ''}
${c.spez_items.length ? spezHtml_gehoben(c,t,f,muted,sep) : ''}
${ablaufHtml()}
<section style="padding:8rem 0;text-align:center"><div class="wrap">
  <span style="font-family:'${f.display.family}',serif;font-weight:300;font-size:clamp(5rem,14vw,10rem);line-height:1;color:${t.accent};display:block">8</span>
  <span style="font-size:.85rem;letter-spacing:.12em;text-transform:uppercase;color:${muted}">Jahre Erfahrung in ${c.ort}</span>
</div></section>
${quotesHtml()}
${sep}
<section style="padding:7rem 0;text-align:center"><div class="wrap"><p style="max-width:52ch;margin:0 auto;color:${muted}">${c.over_text}</p>${qualiHtml(muted)}</div></section>
${sep}
<section style="background:${t.surface_tinted};padding:7rem 0;text-align:center" id="t"><div class="wrap">
  <h2 style="font-family:'${f.display.family}',serif;font-weight:300;font-size:2rem;margin-bottom:1.2rem;line-height:1.15"><em style="font-style:italic">${c.ctaLabelKontakt}</em></h2>
  ${kontaktBodyHtml('IBM Plex Mono')}
  <p style="margin-top:1rem"><a style="font-family:'${f.display.family}',serif;font-weight:300;font-size:1.8rem;color:${t.accent};text-decoration:none" href="tel:${tel()}">${A.tel}</a></p>
  <p style="margin-top:.4rem;color:${muted}">${c.name} · ${c.ort}</p>
</div></section>
<footer><div class="wrap"><span>© 2026 ${c.name}, ${c.ort}</span><span><a href="#">Impressum</a> · <a href="#">Datenschutz</a></span></div></footer>
</body></html>`;
}

const RENDERERS = {
  'warm-nahbar': renderWarmNahbar,
  'modern-transparent': renderModernTransparent,
  'trendig-mutig': renderTrendigMutig,
  'gehoben-elegant': renderGehobenElegant
};

/* ================= GENERIERUNG ================= */
function generate(){
  const world = effectiveWorld(A.charakter, A.branche);
  const c = buildContent();
  const html = RENDERERS[A.charakter](world, c);
  document.getElementById('frame').srcdoc = html;
  document.getElementById('resultat').classList.add('on');
}
function closeResult(){ document.getElementById('resultat').classList.remove('on'); }

render();
</script>
